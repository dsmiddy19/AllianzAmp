name: Update Allianz Show Calendar

on:
  schedule:
    - cron: "0 9 * * *"   # Daily at 9am UTC (5am ET)
  workflow_dispatch:        # Also allows manual runs from GitHub UI

permissions:
  contents: write           # needed to push the updated .ics

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install playwright icalendar python-dateutil pytz beautifulsoup4
          python -m playwright install chromium --with-deps

      - name: Run scraper
        run: python allianz_calendar.py --months 12 --output allianz_shows.ics

      - name: Commit and push updated .ics
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add allianz_shows.ics
          git diff --cached --quiet || git commit -m "chore: update show calendar $(date -u +%Y-%m-%d)"
          git push
